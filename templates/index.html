<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat • OpenRouter</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/bash.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/sql.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/json.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/css.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/html.min.js"></script>
</head>
<body>
    <div class="app-wrapper">
        <div class="bg-gradient"></div>
        <div class="bg-particles"></div>
        
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <div class="logo-icon">
                        <img src="{{ url_for('static', filename='logo.svg') }}" alt="Logo" class="logo-image">
                    </div>
                    <span class="logo-text">sinir<span class="ai-highlight">AI</span>y</span>
                </div>
                <p class="sidebar-subtitle">Powered by <a href="https://github.com/siniray" target="_blank" class="author-link">siniray</a></p>
            </div>
            
            <div class="sidebar-content">
                <div class="section">
                    <div class="section-header">
                        <i class="fas fa-microchip"></i>
                        <h3>Модель</h3>
                    </div>
                    <div class="model-selector-wrapper">
                        <select id="model-select" class="model-select">
                            {% for model in models %}
                            <option value="{{ model.id }}">{{ model.name }}</option>
                            {% endfor %}
                        </select>
                        <i class="fas fa-chevron-down select-arrow"></i>
                    </div>
                </div>
                
                <div class="section">
                    <div class="section-header">
                        <i class="fas fa-sliders-h"></i>
                        <h3>Настройки</h3>
                    </div>
                    <div class="settings-group">
                        <label class="toggle-switch">
                            <input type="checkbox" id="stream-mode" checked>
                            <span class="toggle-slider"></span>
                            <span class="toggle-label">
                                <i class="fas fa-stream"></i>
                                Стриминг
                            </span>
                        </label>
                    </div>
                </div>
                
                <div class="section stats-section">
                    <div class="section-header">
                        <i class="fas fa-chart-simple"></i>
                        <h3>Статистика</h3>
                    </div>
                    <div class="stats-container">
                        <div class="stat-item">
                            <span class="stat-label">Сообщений</span>
                            <span class="stat-value" id="message-count">0</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-label">Токенов</span>
                            <span class="stat-value" id="token-count">0</span>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="sidebar-footer">
                <button id="new-chat" class="btn-sidebar primary">
                    <i class="fas fa-plus-circle"></i>
                    <span>Новый чат</span>
                </button>
            </div>
        </aside>
        
        <main class="chat-main">
            <div class="chat-tabs-container">
                <div class="chat-tabs" id="chat-tabs">
                    <div class="chat-tab active" data-chat-id="default">
                        <span class="tab-name">Чат 1</span>
                        <span class="tab-close" data-chat-id="default">×</span>
                    </div>
                </div>
                <button class="new-tab-btn" id="new-tab-btn">
                    <i class="fas fa-plus"></i>
                </button>
            </div>
            
            <div class="chat-header">
                <div class="chat-header-left">
                    <div class="model-badge" id="current-model-badge">
                        <i class="fas fa-robot"></i>
                        <span id="current-model-name">Auto (Best Free)</span>
                    </div>
                </div>
                <div class="chat-header-right">
                    <div class="connection-status" id="connection-status">
                        <span class="status-dot"></span>
                        <span class="status-text">Подключено</span>
                    </div>
                </div>
            </div>
            
            <div class="messages-wrapper">
                <div class="messages-container" id="messages">
                    <div class="welcome-screen">
                        <div class="welcome-icon">
                            <i class="fas fa-comment-dots"></i>
                        </div>
                        <h1 class="welcome-title">Добро пожаловать в AI Chat</h1>
                        <p class="welcome-subtitle">Выберите модель и начните общение</p>
                        
                        <div class="quick-actions">
                            <button class="quick-action-btn" data-prompt="Привет! Как дела?">
                                <i class="fas fa-hand-wave"></i>
                                Приветствие
                            </button>
                            <button class="quick-action-btn" data-prompt="Объясни что такое искусственный интеллект простыми словами">
                                <i class="fas fa-lightbulb"></i>
                                Что такое AI?
                            </button>
                            <button class="quick-action-btn" data-prompt="Напиши код функции для расчёта факториала на Python">
                                <i class="fas fa-code"></i>
                                Код на Python
                            </button>
                            <button class="quick-action-btn" data-prompt="Придумай креативную идею для стартапа">
                                <i class="fas fa-rocket"></i>
                                Идея стартапа
                            </button>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="input-wrapper">
                <div class="input-container">
                    <div class="input-field-wrapper">
                        <textarea 
                            id="user-input" 
                            class="message-input"
                            placeholder="Введите сообщение..."
                            rows="1"
                            maxlength="4000"
                        ></textarea>
                        <button id="send-btn" class="send-button">
                            <i class="fas fa-paper-plane"></i>
                        </button>
                        <button id="stop-btn" class="stop-button" style="display: none;">
                            <i class="fas fa-stop"></i>
                        </button>
                    </div>
                    <div class="input-footer">
                        <span class="input-hint">
                            <i class="fas fa-keyboard"></i>
                            Enter — отправить, Shift+Enter — новая строка
                        </span>
                        <span class="char-counter">
                            <span id="char-count">0</span>/4000
                        </span>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <div class="toast-container" id="toast-container"></div>
    
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
